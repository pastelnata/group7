<script>
    document.addEventListener("DOMContentLoaded", function() {
    const buttons = document.querySelectorAll(".option-btn");
    const maxSelection = 5; // Limit to 5 selections

    buttons.forEach(button => {
        button.addEventListener("click", function() {
            let selectedButtons = document.querySelectorAll(".option-btn.selected");

            if (this.classList.contains("selected")) {
                this.classList.remove("selected"); // Deselect if already selected
            } else if (selectedButtons.length < maxSelection) {
                this.classList.add("selected"); // Select if under the limit
            } else {
                alert("You can only select up to 5 options.");
            }
        });
    });
});
</script>
