<div class="results-container">
    {% if results %}
    <h3>Search Results:</h3>
    <ul>
        {% for book in results %}
        <li class="result-item">{{ book.title }} by {{ book.author }}</li>
        {% endfor %}
    </ul>
    {% else %}
    {% if query %}
    <p>No results found for "{{ query }}"</p>
    {% endif %}
    {% endif %}
</div>
