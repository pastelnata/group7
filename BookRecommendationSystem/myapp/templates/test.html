<form action="{% url 'search_results' %}" method="GET">
    <input type="text" id="product" name="query" class="search-bar" placeholder="Search for books...">
</form>

<div class="container my-4">
    <h2 class="mb-3">Suggested Books</h2>
    <div class="row">
        {% for book in suggested_books %}
        <div class="col-sm-6 col-md-4 col-lg-3 mb-4">
            <div class="card h-100 text-center">
                <img src="{{ book.cover_url }}" class="card-img-top" alt="{{ book.title }}"
                    style="height: 200px; object-fit: cover;">
                <div class="card-body">
                    <h6 class="card-title mb-1">{{ book.title }}</h6>
                    <small class="text-muted">by {{ book.author }}</small>
                    <div class="mt-2">
                        <a class="btn btn-sm btn-outline-primary">View</a>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
